# Ablation I: transformer decoder.
# 60 learned timestep queries cross-attend over the full 21-step history
# sequence + image/command context. Each output timestep explicitly attends
# to the car's motion history for temporal coherence at long horizon.
# This is the architecturally principled fix for ade_far collapse.

wandb_entity:   tancredelg-personal
wandb_project:  dlav-guido
wandb_run_name: ablate-vitb&augm2&tfmr-dec

data_dir:       data
checkpoint_dir: checkpoints

dino_model:     dinov3_vitb16
dino_repo_dir:  /scratch/izar/tlamort/dinov3
dino_weights:   /scratch/izar/tlamort/dinov3/weights/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth

hist_hidden_dim: 128
cmd_embed_dim:   32
fusion_arch:     concat
fusion_dim:      256
decoder_arch:    transformer   # the only change vs vitb&augm2 baseline
decoder_d:       128           # inner dim of transformer decoder
decoder_layers:  2             # number of cross-attention layers
num_heads:       4
dropout:         0.05

seed: 42
batch_size:   48
num_workers:  4

num_epochs:   60
lr:           5.0e-4
weight_decay: 1.0e-4
grad_clip:    1.0
min_lr:       1.0e-6
log_interval: 20

mirror_p:       0.25
hist_noise_std: 0.02
mirror_warmup:  10